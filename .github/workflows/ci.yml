name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax (bash -n) — hard gate
        run: |
          for f in hooks/*.sh; do
            echo "checking $f"
            bash -n "$f"
          done

      - name: Unit tests (resolve-verbosity) — hard gate
        run: bash hooks/test-resolve-verbosity.sh

      - name: Unit tests (resolve-build-gate) — hard gate
        run: bash hooks/test-resolve-build-gate.sh

      - name: Unit tests (commit-secret-gate) — hard gate
        run: bash hooks/test-commit-secret-gate.sh

      - name: Unit tests (weakening-scan) — hard gate
        run: bash hooks/test-weakening-scan-unit.sh

      - name: Validate JSON — hard gate
        run: |
          jq -e . hooks/hooks.json > /dev/null
          jq -e . .claude-plugin/plugin.json > /dev/null
          jq -e . .claude-plugin/marketplace.json > /dev/null

      - name: ShellCheck (informational)
        run: shellcheck hooks/*.sh || true
